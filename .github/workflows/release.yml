name: GitHub Release Automation

on:
  push:
    tags:
      - 'v*' # Push events to matching v*, i.e. v1.0, v20.15.10
  workflow_dispatch:

jobs:
  release:
    name: Build and Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm install

      - name: Build Web App
        run: npm run build

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Sync and Build Android APK
        run: |
          npx cap sync android
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Rename APK for Release
        run: |
          # Use the tag name if available, else use a default name for workflow_dispatch
          TAG_NAME=${GITHUB_REF#refs/tags/}
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            mv android/app/build/outputs/apk/debug/app-debug.apk "android/app/build/outputs/apk/debug/BharatSolarCalculator-${TAG_NAME}.apk"
          else
            mv android/app/build/outputs/apk/debug/app-debug.apk "android/app/build/outputs/apk/debug/BharatSolarCalculator-latest.apk"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/debug/*.apk
          generate_release_notes: true
          draft: false
          prerelease: false
